    <script>
        const DB_URL = "https://panel.moviestream.lat/api/movies";
        let MASTER_DATA = [];
        let selectedCategories = [];

        // Close search suggestion when click outside
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.search-container')) {
                document.getElementById('search_suggestions')?.classList.add('hidden');
            }
        });

        window.onload = async () => {
            try {
                const savedName = localStorage.getItem('ms_user_name');
                if (savedName) {
                    const topUserName = document.getElementById('top_user_name');
                    if(topUserName) {
                        topUserName.innerText = `Hey, ${savedName}`;
                        topUserName.classList.remove('hidden');
                    }
                }

                const res = await fetch(`${DB_URL}?v=${new Date().getTime()}`);
                MASTER_DATA = await res.json();
                
                initFilters();

                const urlParams = new URLSearchParams(window.location.search);
                const viewCat = urlParams.get('view_cat');

                if (viewCat) {
                    const box = document.querySelector(`.cat-checkbox[value="${viewCat}"]`);
                    if(box) box.checked = true;
                    applyFilters();
                } else {
                    const trending = MASTER_DATA.filter(m => m.isTrending === true || m.isTrending === "true");
                    const heroMovie = trending.length > 0 ? trending[0] : (MASTER_DATA.length > 0 ? MASTER_DATA[0] : null);
                    if(heroMovie) updateHero(heroMovie);
                    renderContent(MASTER_DATA);
                }
                
            } catch (e) { 
                console.error("System Error", e);
                const heroTitle = document.getElementById('hero_title');
                if(heroTitle) heroTitle.innerText = "OFFLINE MODE"; 
            } finally {
                document.body.classList.add('loaded'); 
            }
        };

        function initFilters() {
            const categories = [
                { id: "Action", name: "Action" }, 
                { id: "Lovely", name: "Romance" }, 
                { id: "Horror", name: "Horror" }, 
                { id: "Animation", name: "Animation" }, 
                { id: "TV Series", name: "TV Series" },
                { id: "Sinhala Dubbed", name: "සිංහල හඬකැවූ", fontClass: "sinhala-font tracking-normal" }
            ];

            const catContainer = document.getElementById('filter_categories');
            categories.forEach(cat => {
                catContainer.innerHTML += `
                    <label class="flex items-center gap-3 group mb-3">
                        <input type="checkbox" value="${cat.id}" class="custom-checkbox cat-checkbox" onchange="applyFilters()">
                        <span class="filter-label ${cat.fontClass || ''}">${cat.name}</span>
                    </label>
                `;
            });
        }

        function applyFilters() {
            const catBoxes = document.querySelectorAll('.cat-checkbox:checked');
            selectedCategories = Array.from(catBoxes).map(b => b.value);

            const isFiltering = selectedCategories.length > 0;

            if (isFiltering) {
                document.getElementById('hero').style.display = 'none';
                document.getElementById('dynamic_sections').style.display = 'none';
                document.getElementById('filtered_results_area').style.display = 'block';

                let filtered = MASTER_DATA.filter(m => {
                    if(!m || !m.title) return false;
                    let catMatch = selectedCategories.length === 0 || selectedCategories.includes(m.category);
                    return catMatch;
                });

                renderFilteredGrid(filtered);
            } else {
                document.getElementById('hero').style.display = 'flex';
                document.getElementById('dynamic_sections').style.display = 'block';
                document.getElementById('filtered_results_area').style.display = 'none';
                window.history.pushState({}, document.title, window.location.pathname);
            }
        }

        function clearFilters() {
            document.querySelectorAll('.custom-checkbox').forEach(b => b.checked = false);
            applyFilters();
        }

        function renderFilteredGrid(data) {
            const container = document.getElementById('filtered_grid');
            const countText = document.getElementById('filtered_count');
            
            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-50"><i class="fa-solid fa-ghost text-6xl text-[#00d2ff] mb-4"></i><h2 class="text-xl md:text-2xl font-black uppercase text-white tracking-widest">No Movies Found</h2></div>`;
                countText.innerText = "0 Items Found";
                return;
            }

            countText.innerText = `Showing ${data.length} Masterpieces`;

            let html = ``;
            data.forEach(m => {
                html += `
                    <div class="movie-card flex flex-col" onclick="location.href='movie-details.html?id=${m._id}'">
                        <div class="card-inner w-full relative">
                            <img src="${m.imageUrl}" class="w-full h-full object-cover absolute inset-0" loading="lazy">
                            <div class="absolute top-3 right-3 badge-4k">${m.quality || '4K'}</div>
                        </div>
                        <h3 class="mt-4 text-[11px] font-black text-white uppercase tracking-wider w-full break-words whitespace-normal line-clamp-2">${m.title}</h3>
                        <p class="text-[9px] text-[#00d2ff] uppercase font-bold mt-1 tracking-widest">${m.year || '2026'}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updateHero(m) {
            if(!m) return;
            document.getElementById('hero_title').innerText = m.title || "UNKNOWN TITLE";
            document.getElementById('hero_poster').src = m.imageUrl;
            document.getElementById('hero_desc').innerText = m.description || "Immerse yourself in this stunning 4K masterpiece. Experience unparalleled visual quality and seamless cloud streaming exclusively on MovieStream Ultra.";
            document.getElementById('hero_quality').innerText = m.quality || "HD";
            document.getElementById('hero_btn').onclick = () => { location.href = "movie-details.html?id=" + m._id; };
        }

        function renderContent(data) {
            const container = document.getElementById('dynamic_sections');
            container.innerHTML = '';
            
            const cats = [
                { id: "Sinhala Dubbed", name: "සිංහල හඬකැවූ", fontClass: "sinhala-font tracking-normal" },
                { id: "Action", name: "Action", fontClass: "" }, 
                { id: "Lovely", name: "Romance", fontClass: "" }, 
                { id: "Horror", name: "Horror", fontClass: "" }, 
                { id: "Animation", name: "Animation", fontClass: "" }, 
                { id: "TV Series", name: "TV Series", fontClass: "" }
            ];
            
            cats.forEach(cat => {
                const filtered = data.filter(m => m.category === cat.id && (m.showMain === true || m.showMain === "true"));
                if(filtered.length === 0) return;
                
                const uniqueTitles = new Set();
                const uniqueFiltered = [];
                filtered.forEach(m => {
                    const t = (m.title || "").toLowerCase().trim();
                    if (!uniqueTitles.has(t)) {
                        uniqueTitles.add(t);
                        uniqueFiltered.push(m);
                    }
                });

                let safeId = cat.id.replace(/\s+/g, '_');
                
                let html = `<div id="cat_${safeId}"><div class="flex justify-between items-center mb-6 border-l-4 border-[#00d2ff] pl-3"><h2 class="text-base md:text-xl font-black uppercase text-white ${cat.fontClass}">${cat.name}</h2><a href="?view_cat=${encodeURIComponent(cat.id)}" class="text-[10px] font-black uppercase text-[#00d2ff]">See All <i class="fa fa-chevron-right ml-1"></i></a></div><div class="flex gap-4 md:gap-6 overflow-x-auto hide-scrollbar pb-6">`;
                uniqueFiltered.slice(0, 10).forEach(m => {
                    html += `<div class="movie-card flex flex-col w-[140px] md:w-[180px] shrink-0" onclick="location.href='movie-details.html?id=${m._id}'"><div class="card-inner w-full relative"><img src="${m.imageUrl}" class="w-full h-full object-cover absolute inset-0" loading="lazy"><div class="absolute top-2 right-2 badge-4k">${m.quality || '4K'}</div></div><h3 class="mt-3 text-[10px] font-bold text-gray-400 uppercase w-full break-words whitespace-normal line-clamp-2">${(m.title || "")}</h3></div>`;
                });
                container.innerHTML += html + '</div></div>';
            });
        }

        function liveSearch(q) {
            const suggestions = document.getElementById('search_suggestions');
            document.getElementById('clear_search').style.display = q.length > 0 ? 'block' : 'none';
            
            if(q.length < 2) { 
                suggestions.classList.add('hidden'); 
                return; 
            }
            
            const uniqueTitles = new Set();
            const filtered = [];
            MASTER_DATA.forEach(m => {
                if (!m.title) return;
                if (m.title.toLowerCase().includes(q.toLowerCase())) {
                    const t = m.title.toLowerCase().trim();
                    if (!uniqueTitles.has(t)) {
                        uniqueTitles.add(t);
                        filtered.push(m);
                    }
                }
            });

            suggestions.classList.remove('hidden');
            suggestions.classList.add('flex');
            
            if(filtered.length > 0) {
                suggestions.innerHTML = filtered.slice(0, 6).map(m => `
                    <div class="suggestion-item" onclick="location.href='movie-details.html?id=${m._id}'">
                        <img src="${m.imageUrl}" class="w-10 h-14 object-cover rounded border border-white/10 shadow-md">
                        <div class="overflow-hidden flex flex-col justify-center">
                            <h4 class="text-white text-[11px] md:text-[12px] font-black uppercase truncate w-full break-words">${m.title}</h4>
                            <p class="text-[9px] text-[#00d2ff] font-bold uppercase mt-0.5">${m.year || ''} • ${m.quality || 'HD'}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                suggestions.innerHTML = `<div class="p-5 text-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">No Movies Found</div>`;
            }
        }
        
        function clearSearch() { 
            document.getElementById('main_search').value = ''; 
            document.getElementById('search_suggestions').classList.add('hidden');
            document.getElementById('clear_search').style.display = 'none';
        }
    </script>

    <script>
        const canvas = document.getElementById('hero-3d-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        
        const heroSection = document.getElementById('hero');
        renderer.setSize(heroSection.offsetWidth, heroSection.offsetHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001a33);
        scene.fog = new THREE.FogExp2(0x001a33, 0.0012);

        const camera = new THREE.PerspectiveCamera(60, heroSection.offsetWidth / heroSection.offsetHeight, 1, 5000);
        camera.position.z = 600;

        const particleCount = 4000;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = [];
        const particleVel = [];

        const pSpreadX = window.innerWidth < 768 ? window.innerWidth * 1.5 : 3000;

        for (let i = 0; i < particleCount; i++) {
            particlePos.push((Math.random() - 0.5) * pSpreadX, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 3000);
            particleVel.push(Math.random() * 0.8 + 0.2);
        }

        particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x00d2ff, size: 3, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        scene.add(new THREE.Points(particleGeo, particleMat));

        const glassMaterial = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, transparent: true, roughness: 0.1, emissive: 0x0055ff, emissiveIntensity: 0.3 });
        const coreMaterial = new THREE.MeshBasicMaterial({ color: 0xff00aa, wireframe: true, transparent: true, opacity: 0.5 });
        const jellyfishList = [];

        const jfSpreadX = window.innerWidth < 768 ? window.innerWidth : 1500;

        for(let i=0; i<5; i++) {
            const jf = new THREE.Group();
            jf.add(new THREE.Mesh(new THREE.IcosahedronGeometry(20, 1), coreMaterial));
            jf.add(new THREE.Mesh(new THREE.SphereGeometry(35, 16, 16), glassMaterial));
            jf.position.set((Math.random() - 0.5) * jfSpreadX, (Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 800 - 200);
            jf.userData = { speed: Math.random() * 0.5 + 0.5, offset: Math.random() * 10 };
            scene.add(jf);
            jellyfishList.push(jf);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const pinkLight = new THREE.PointLight(0xff00aa, 4, 2000);
        pinkLight.position.set(500, 200, 100);
        scene.add(pinkLight);
        const cyanLight = new THREE.PointLight(0x00ffff, 4, 2000);
        cyanLight.position.set(-500, -200, -200);
        scene.add(cyanLight);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2);
            mouseY = (event.clientY - window.innerHeight / 2);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            camera.position.x += (mouseX * 0.15 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.15 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            const posAttr = particleGeo.attributes.position;
            for (let i = 0; i < particleCount; i++) {
                let y = posAttr.getY(i) + particleVel[i];
                if (y > 1000) y = -1000;
                posAttr.setY(i, y);
            }
            posAttr.needsUpdate = true;

            jellyfishList.forEach(jf => {
                jf.position.y += Math.sin(time * jf.userData.speed + jf.userData.offset) * 2;
                jf.rotation.y += 0.01;
            });

            pinkLight.intensity = 3 + Math.sin(time * 2) * 1.5;
            cyanLight.intensity = 3 + Math.cos(time * 1.5) * 1.5;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = heroSection.offsetWidth / heroSection.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(heroSection.offsetWidth, heroSection.offsetHeight);
        });
    </script>
</body>
</html>
