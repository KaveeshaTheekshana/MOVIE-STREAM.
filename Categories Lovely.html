<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page_title">Category | Movie Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700;800&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        // =====================================================================
        // 🔴 මෙතන විස්තර වෙනස් කරලා ඕනෑම කැටගරි එකකට පේජ් හදාගන්න 🔴
        // =====================================================================

        const CATEGORY_TITLE = "🔥 දැන් ජනප්‍රිය (Trending Now)";
        const CATEGORY_DESC = "මේ දිනවල ලොව පුරා වැඩිපුරම නරඹන ජනප්‍රියතම චිත්‍රපට සහ කතා මාලා.";

        // 👇 මෙම පේජ් එකේ පෙන්වන සහ සර්ච් වෙන ෆිල්ම්ස් මෙතනට දාන්න 👇
        const CATEGORY_MOVIES = [
            { name: "Stranger Things", img: "https://m.media-amazon.com/images/M/MV5BMDZkYmVhNjMtNWU4MC00MDQxLWE3MjYtZGMzZWI1ZjhlOWJmXkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg", url: "stranger-things.html" },
            { name: "Money Heist", img: "https://m.media-amazon.com/images/M/MV5BODI0ZTljYTEtOTQ1MS00YTI1LWI2ZTEtZDRjY2ExN2VlMmE0XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg", url: "money-heist.html" },
            { name: "Wednesday", img: "https://m.media-amazon.com/images/M/MV5BMjMwOTA4NDctNDM4OS00MDU1LWFjNzItMjdlMzQ5YzEwMGM4XkEyXkFqcGdeQXVyMTMzNDExODE5._V1_.jpg", url: "wednesday.html" },
            { name: "Squid Game", img: "https://m.media-amazon.com/images/M/MV5BYWE3MDVkN2ItZTI5NC00ZGIzLThmY2UtNjYwMTBhOTUyYmI4XkEyXkFqcGdeQXVyMTMzNDExODE5._V1_.jpg", url: "squid-game.html" },
            { name: "Lucifer", img: "https://m.media-amazon.com/images/M/MV5BNDJjMzc4NGYtZmFmNS00Y2ZiLThjMWQtZDA2MWExYTM5Y2Y4XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg", url: "lucifer.html" },
            { name: "Peaky Blinders", img: "https://m.media-amazon.com/images/M/MV5BZjRjOTFkOTktZWUzMi00YzMyLThkMmYtMjEwNmQyNzliYTNmXkEyXkFqcGdeQXVyNzQ1ODk3MTQ@._V1_.jpg", url: "peaky-blinders.html" },
            { name: "Dark", img: "https://m.media-amazon.com/images/M/MV5BMzA2NDkwNjAwNV5BMl5BanBnXkFtZTgwNTA2OTg5NDM@._V1_.jpg", url: "dark.html" },
            { name: "The Witcher", img: "https://m.media-amazon.com/images/M/MV5BMTQ5MzkzNTIyN15BMl5BanBnXkFtZTgwNDMwNzYxMTE@._V1_.jpg", url: "witcher.html" }
        ];

        // =====================================================================

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'Noto Sans Sinhala', 'sans-serif'] },
                    colors: { netflix_red: '#E50914', dark_bg: '#050505' },
                    animation: {
                        'zoom-in': 'zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        zoomIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .glass-card { background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 🎬 Movie Card Hover Animations */
        .movie-card { transition: transform 0.3s ease, border-color 0.3s ease, filter 0.3s; }
        .movie-card:hover { transform: scale(1.08); z-index: 20; border-color: rgba(229, 9, 20, 0.8); box-shadow: 0 15px 35px rgba(229, 9, 20, 0.4); }
        .movie-card:hover img { filter: brightness(0.7); }
        .movie-card:hover .play-icon { opacity: 1; transform: scale(1); }
        .play-icon { opacity: 0; transform: scale(0.5); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="font-sans antialiased" oncontextmenu="return false;">

    <nav class="fixed top-0 w-full z-50 flex items-center justify-between px-4 md:px-16 py-4 md:py-6 bg-gradient-to-b from-black/95 via-black/80 to-transparent">
        <div class="flex items-center gap-3 md:gap-6">
            <button onclick="history.back()" class="text-white hover:text-netflix_red transition-colors text-lg md:text-2xl mr-2 hover:-translate-x-1 duration-300">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <a href="index.html" class="text-xl md:text-3xl font-black tracking-tighter uppercase flex items-center cursor-pointer hover:scale-105 transition-transform">
                <span class="text-white">Movie</span><span class="text-netflix_red">Stream</span>
            </a>
            <div id="user_display" class="hidden text-[10px] md:text-sm font-bold bg-white/10 px-3 py-1.5 rounded-full border border-white/20 shadow-lg ml-1 md:ml-2">
                <i class="fa-solid fa-user text-netflix_red mr-1.5"></i> <span id="display_name" class="tracking-wide hidden sm:inline-block"></span>
            </div>
        </div>
        
        <div class="flex items-center gap-3 md:gap-4">
            <div class="relative z-50">
                <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                <input type="text" id="nav_search" autocomplete="off" oninput="performSearch(this.value)" placeholder="Search..." class="bg-white/10 border border-white/20 text-white text-[10px] md:text-xs font-bold rounded-full py-2 pl-8 md:pl-9 pr-3 outline-none focus:border-netflix_red focus:bg-black/90 w-28 sm:w-48 md:focus:w-64 transition-all placeholder-gray-400">
                
                <ul id="search_suggestions" class="absolute top-[120%] left-0 w-full bg-[#111] border border-gray-700 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] hidden max-h-48 overflow-y-auto z-[100] hide-scrollbar py-1">
                    </ul>
            </div>
            
            <a href="whatsapp://send?phone=94710388481&text=Hi" class="w-8 h-8 rounded-full bg-netflix_red flex items-center justify-center hover:scale-110 transition-transform cursor-pointer shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                <i class="fa-solid fa-headset text-white text-xs"></i>
            </a>
        </div>
    </nav>

    <div class="pt-24 md:pt-32 px-5 md:px-16 pb-6 animate-[fadeIn_1s_ease-in-out]">
        <h1 id="cat_title" class="text-3xl md:text-5xl font-black text-white drop-shadow-xl mb-2 border-l-4 border-netflix_red pl-4 uppercase tracking-wide"></h1>
        <p id="cat_desc" class="text-gray-400 text-xs md:text-sm max-w-2xl pl-4 leading-relaxed"></p>
    </div>

    <div id="movies_grid" class="px-5 md:px-16 pb-20 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 md:gap-6 relative z-40 min-h-[50vh] content-start">
        </div>

    <footer class="bg-[#080808] py-8 md:py-10 px-5 text-center border-t border-white/5 space-y-3 mt-10">
        <p class="text-[10px] md:text-xs text-gray-500 leading-relaxed max-w-3xl mx-auto">
            <b class="text-netflix_red">අයිතිය පිළිබඳ දැනුවත් කිරීම:</b> මෙම වෙබ් අඩවිය හරහා ලබාදෙන චිත්‍රපට වල සම්පූර්ණ අයිතිය <span class="text-gray-300">Cinesubz.net</span> වෙත හිමිවන අතර, අප මෙය නිර්මාණය කළේ ඔබට WhatsApp හරහා පහසුවෙන් චිත්‍රපට ලබා ගැනීමටයි.
        </p>
        <p class="text-[9px] md:text-[10px] uppercase font-bold tracking-[0.3em] text-gray-600 pt-2">
            Movie Cinema © 2026 | Powered by Kaveesha Theekshana
        </p>
    </footer>

    <script>
        // Security
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        }

        window.onload = () => {
            // Set Page Titles
            document.title = `${CATEGORY_TITLE} | Movie Stream`;
            document.getElementById('cat_title').innerText = CATEGORY_TITLE;
            document.getElementById('cat_desc').innerText = CATEGORY_DESC;

            // Initial Render of all Category Movies
            renderGrid(CATEGORY_MOVIES);

            // Display logged user
            const name = localStorage.getItem('kavi_user_name');
            if (name) {
                document.getElementById('user_display').classList.remove('hidden');
                document.getElementById('display_name').innerText = name;
            }
        };

        // 🔴 Function to Render Movies to the Grid
        function renderGrid(moviesToRender) {
            const gridContainer = document.getElementById('movies_grid');
            
            if (moviesToRender.length === 0) {
                gridContainer.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center pt-20 text-gray-500 animate-zoom-in">
                        <i class="fa-solid fa-ghost text-5xl md:text-6xl mb-4 opacity-30"></i>
                        <p class="text-sm md:text-lg font-bold">චිත්‍රපට හමුවූයේ නැත!</p>
                    </div>`;
                return;
            }

            let gridHTML = "";
            moviesToRender.forEach((movie, index) => {
                const animDelay = index * 0.05; 
                gridHTML += `
                    <div onclick="window.location.href='${movie.url}'" style="animation-delay: ${animDelay}s; opacity: 0;" class="movie-card animate-zoom-in w-full aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer group bg-dark_bg">
                        <img src="${movie.img}" class="w-full h-full object-cover transition-all duration-500" loading="lazy" alt="${movie.name}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end items-center p-3">
                            <div class="play-icon absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 md:w-14 md:h-14 bg-netflix_red rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(229,9,20,0.8)]">
                                <i class="fa-solid fa-play text-white text-sm md:text-xl ml-1"></i>
                            </div>
                            <p class="text-[10px] md:text-xs font-bold uppercase text-center text-white drop-shadow-lg truncate w-full mb-1">${movie.name}</p>
                        </div>
                    </div>
                `;
            });
            gridContainer.innerHTML = gridHTML;
        }

        // 🔍 🔴 Live Inline Search Logic (වෙනම UI එකක් එන්නේ නෑ)
        function performSearch(query) {
            query = query.toLowerCase().trim();
            const suggestionsBox = document.getElementById('search_suggestions'); 
            
            // Filter the category movies
            let filteredMovies = CATEGORY_MOVIES;

            if (query !== '') {
                filteredMovies = CATEGORY_MOVIES.filter(m => m.name.toLowerCase().includes(query));
                
                // Show Name Suggestions
                if (filteredMovies.length > 0) {
                    suggestionsBox.classList.remove('hidden');
                    let suggestionsHTML = '';
                    filteredMovies.forEach(m => {
                        suggestionsHTML += `
                            <li onclick="window.location.href='${m.url}'" class="px-4 py-2.5 text-gray-400 hover:text-white hover:bg-gray-800 cursor-pointer border-b border-gray-800/50 last:border-0 transition-colors font-bold text-[10px] md:text-sm truncate flex items-center gap-2">
                                <i class="fa-solid fa-film text-gray-600"></i> ${m.name}
                            </li>
                        `;
                    });
                    suggestionsBox.innerHTML = suggestionsHTML;
                } else {
                    suggestionsBox.classList.add('hidden');
                }
            } else {
                // If search is cleared, hide suggestions
                suggestionsBox.classList.add('hidden');
            }

            // Update the main Grid dynamically
            renderGrid(filteredMovies);
        }

        // Click outside to hide suggestions
        document.addEventListener('click', function(event) {
            const searchBox = document.getElementById('nav_search');
            const suggestionsBox = document.getElementById('search_suggestions');
            if (!searchBox.contains(event.target) && !suggestionsBox.contains(event.target)) {
                suggestionsBox.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
