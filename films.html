<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIE STREAM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff003c;
            --bg: #050505;
            --card-bg: #121212;
            --glass-border: rgba(255, 255, 255, 0.08);
            --btn-glow: rgba(255, 0, 60, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans Sinhala', sans-serif; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #220000 0%, #050505 80%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header & Logo Animation --- */
        header { padding: 30px 6%; position: sticky; top: 0; z-index: 2000; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; gap: 20px; }

        .logo { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        
        /* Logo Animation & Link */
        .logo a {
            text-decoration: none;
            background: linear-gradient(90deg, #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .search-wrapper { position: relative; width: 100%; max-width: 450px; }
        .search-container { 
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--glass-border); border-radius: 12px; padding: 5px 15px;
            transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 0, 60, 0.2); }
        
        input { flex: 1; background: none; border: none; color: #fff; padding: 10px 5px; outline: none; font-size: 0.95rem; }
        .clear-search { font-size: 1.2rem; cursor: pointer; color: #666; margin-right: 10px; display: none; }
        .btn-search-now { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }

        /* --- Main Content --- */
        main { padding: 40px 6%; transition: 0.5s; }
        .film-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; transition: gap 0.5s ease; }
        .film-grid.searching-gap { gap: 70px 40px; }

        /* --- FILM CARD --- */
        .film-card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass-border);
            overflow: hidden; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); position: relative;
        }

        .film-card:hover { transform: translateY(-10px); border-color: rgba(255, 0, 60, 0.5); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7); }
        .poster { width: 100%; aspect-ratio: 2/3; overflow: hidden; position: relative; }
        .poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .film-card:hover .poster img { transform: scale(1.1); }

        .card-details { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card-details h3 { font-size: 1.1rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .meta-info { display: flex; gap: 8px; }
        .meta-info span { 
            font-size: 0.7rem; font-weight: 700; color: #aaa;
            background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 5px; border: 1px solid var(--glass-border);
        }
        .meta-info .year { color: var(--accent); border-color: rgba(255, 0, 60, 0.2); }

        /* --- CLEAN DOWNLOAD BUTTON --- */
        .btn-download-normal {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            color: #fff; text-decoration: none; border-radius: 10px; font-weight: 800;
            border: 1px solid var(--glass-border); transition: 0.3s; text-transform: uppercase;
        }
        .btn-download-normal:hover { background: var(--accent); box-shadow: 0 5px 20px var(--btn-glow); border-color: var(--accent); }

        /* --- SEARCH EFFECTS --- */
        .is-blur { filter: blur(15px); opacity: 0.1; transform: scale(0.85); pointer-events: none; }
        .highlight { transform: scale(1.1) !important; border-color: var(--accent); z-index: 100; box-shadow: 0 0 50px rgba(255, 0, 60, 0.4); }

        @media (max-width: 600px) { .film-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
    </style>
</head>
<body>

    <header>
        <div class="nav-content">
            <div class="logo">
                <a href="index.html">MOVIE STREAM</a>
            </div>
            
            <div class="search-wrapper">
                <div class="search-container">
                    <input type="text" id="movieSearch" placeholder="Search movies..." autocomplete="off">
                    <span class="clear-search" id="clearBtn">&times;</span>
                    <button class="btn-search-now" id="searchBtn">SEARCH</button>
                </div>
            </div>
        </div>
    </header>

    <main id="mainArea">
        <div class="film-grid" id="filmGrid">
            
            <div class="film-card" data-title="Sonic the Hedgehog">
                <div class="poster"><img src="https://cinesubz.net/wp-content/uploads/2021/11/aQvJ5WPzZgYVDrxLX4R6cLJCEaQ.jpg"></div>
                <div class="card-details">
                    <h3>Sonic the Hedgehog</h3>
                    <div class="meta-info"><span class="year">2020</span><span>ACTION</span><span>4K</span></div>
                    <a href="Sonic 1_page.html" class="btn-download-normal">Download</a>
                </div>
            </div>

            <div class="film-card" data-title="Scream 7">
                <div class="poster"><img src="https://cinesubz.net/wp-content/uploads/2026/03/jjyuk0edLiW8vOSnlfwWCCLpbh5.jpg"></div>
                <div class="card-details">
                    <h3>Scream 7</h3>
                    <div class="meta-info"><span class="year">2026</span><span>HORROR</span><span>DUBBED</span></div>
                    <a href="#" class="btn-download-normal">Download</a>
                </div>
            </div>

            <div class="film-card" data-title="Lucky Superstar">
                <div class="poster"><img src="https://cinesubz.net/wp-content/uploads/2026/02/fb5ao0wON2Dq3atOy3rikyL8IsP.jpg"></div>
                <div class="card-details">
                    <h3>Lucky Superstar</h3>
                    <div class="meta-info"><span class="year">2026</span><span>DRAMA</span><span>SINHALA</span></div>
                    <a href="#" class="btn-download-normal">Download</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const searchInput = document.getElementById('movieSearch');
        const clearBtn = document.getElementById('clearBtn');
        const filmGrid = document.getElementById('filmGrid');
        const filmCards = document.querySelectorAll('.film-card');

        function resetAll() {
            searchInput.value = "";
            clearBtn.style.display = "none";
            filmGrid.classList.remove('searching-gap');
            filmCards.forEach(card => {
                card.classList.remove('is-blur', 'highlight');
                card.style.display = "block";
            });
        }

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) { resetAll(); return; }
            clearBtn.style.display = "block";
            filmGrid.classList.add('searching-gap');
            filmCards.forEach(card => {
                const title = card.dataset.title.toLowerCase();
                if (title.includes(query)) {
                    card.classList.remove('is-blur');
                    card.classList.add('highlight');
                } else {
                    card.classList.add('is-blur');
                    card.classList.remove('highlight');
                }
            });
        }

        searchInput.addEventListener('input', performSearch);
        clearBtn.addEventListener('click', resetAll);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    </script>
</body>
</html>
