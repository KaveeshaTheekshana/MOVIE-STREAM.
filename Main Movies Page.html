    <script>
        // 🔴 Featured Movie එක මෙතනින් වෙනස් කරන්න

        };

        const MOVIE_CATEGORIES = [
            {

                    { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },

                    { name: "Lucifer", img: "https://m.media-amazon.com/images/M/MV5BNDJjMzc4NGYtZmFmNS00Y2ZiLThjMWQtZDA2MWExYTM5Y2Y4XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg", url: "lucifer.html" }
                ]

            {

                allUrl: "action-all.html",
                movies: [
                    { name: "Jurassic World Rebirth (2025)", img: "https://i.pinimg.com/1200x/03/36/14/03361454d641353d98ab0fbc500fc81f.jpg", url: "Jurassic World Rebirth (2025).html" },

             ,

                allUrl: "action-all.html",

                    { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },

                ]

        ];

        // 🔴 මෙතනට තමයි සර්ච් එකට අහුවෙන්න ඕන අලුත් මූවීස් එකතු කරන්නේ
        // මේ ලිස්ට් එකට දාන ඒවා හෝම් පේජ් එකේ පේන්න නැති වුණත් සර්ච් කරද්දී පෙන්වනවා
        const ADDITIONAL_SEARCH_MOVIES = [
             { name: "With Love", img: "https://i.pinimg.com/1200x/53/c1/b3/53c1b328675424f0a380118a919a0b89.jpg", url: "With Love (2026).html" },
                    { name: "Premalu (2024)", img: "https://i.pinimg.com/736x/4d/c0/e5/4dc0e57536ef442e159bf92e7bb01dbe.jpg", url: "Premalu (2024).html" },
            { name: "Jurassic World Rebirth (2025)", img: "https://i.pinimg.com/1200x/03/36/14/03361454d641353d98ab0fbc500fc81f.jpg", url: "Jurassic World Rebirth (2025).html" },
         { name: "River of Blood (2024)", img: "https://www.acmodasi.in/amdb/images/movie/c/h/river-of-blood-2024-jJpEuJ.jpg", url: "River of Blood (2024).html" },
        
        
        
        
        
        
        
        
        
        
        
            { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },
        ];





        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'Noto Sans Sinhala', 'sans-serif'] },
                    colors: { netflix_red: '#E50914', dark_bg: '#050505' },
                    animation: { 'zoom-in': 'zoomIn 0.3s ease-out forwards' },
                    keyframes: { zoomIn: { '0%': { transform: 'scale(0.9)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; user-select: none; }
        .hero-bg { background-size: cover; background-position: top center; height: 75dvh; min-height: 550px; position: relative; }
        .hero-overlay { background: linear-gradient(to right, rgba(5,5,5,1) 0%, rgba(5,5,5,0.6) 60%, rgba(5,5,5,0) 100%), linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0) 30%); height: 100%; width: 100%; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .movie-card { transition: transform 0.3s ease; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; }
        
        /* සර්ච් රිසල්ට් එක ආවම සෙක්ෂන් එක මැදට එන්න */
        .search-grid-active { display: grid !important; flex-direction: unset !important; space-y: 0 !important; }
    </style>
</head>
<body class="font-sans antialiased" oncontextmenu="return false;">

    <nav class="fixed top-0 w-full z-50 flex items-center justify-between px-4 md:px-16 py-4 md:py-6 bg-gradient-to-b from-black/95 via-black/80 to-transparent">
        <div class="flex items-center gap-3 md:gap-6">
            <a href="index.html" class="text-xl md:text-3xl font-black uppercase tracking-tighter flex items-center cursor-pointer hover:scale-105 transition-transform">
                <span class="text-white">Movie</span><span class="text-netflix_red">Stream</span>
            </a>
            <div id="user_display" class="hidden text-[10px] md:text-sm font-bold bg-white/10 px-3 py-1.5 rounded-full border border-white/20 shadow-lg ml-1 md:ml-2">
                <i class="fa-solid fa-user text-netflix_red mr-1.5"></i> <span id="display_name" class="tracking-wide"></span>
            </div>
        </div>
        
        <div class="flex items-center gap-3 md:gap-4">
            <div class="relative z-50 flex items-center">
                <i class="fa-solid fa-search absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                <input type="text" id="nav_search" autocomplete="off" oninput="performSearch(this.value)" placeholder="Search Movies..." class="bg-white/10 border border-white/20 text-white text-[10px] md:text-xs font-bold rounded-2xl py-2 md:py-2.5 pl-8 md:pl-10 pr-8 md:pr-10 outline-none focus:border-netflix_red focus:bg-black/90 w-32 sm:w-48 transition-all placeholder-gray-400 shadow-lg">
                <i id="clear_search_btn" class="fa-solid fa-circle-xmark absolute right-3 md:right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer hidden hover:text-netflix_red transition-colors text-xs md:text-sm" onclick="clearSearch()"></i>
                <ul id="search_suggestions" class="absolute top-[110%] left-0 w-[180px] sm:w-[250px] bg-[#111] border border-gray-700 rounded-xl shadow-2xl hidden max-h-60 overflow-y-auto z-[100] py-2"></ul>
            </div>
            <a href="whatsapp://send?phone=94710388481" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-netflix_red flex items-center justify-center hover:scale-110 transition-transform cursor-pointer shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                <i class="fa-solid fa-headset text-white text-xs md:text-sm"></i>
            </a>
        </div>
    </nav>

    <div id="hero" class="hero-bg cursor-pointer" onclick="window.location.href=FEATURED_MOVIE.url">
        <div class="hero-overlay flex flex-col justify-end pb-16 md:justify-center pt-28 px-5 md:px-16">
            <div class="max-w-2xl space-y-3 md:space-y-4 w-full">
                <div class="flex items-center gap-2 bg-netflix_red/20 border border-netflix_red/50 w-fit px-3 md:px-4 py-1 md:py-1.5 rounded-sm mb-2 shadow-[0_0_15px_rgba(229,9,20,0.4)] backdrop-blur-sm">
                    <i class="fa-solid fa-fire text-netflix_red text-xs md:text-sm animate-pulse"></i>
                    <span class="text-[10px] md:text-xs font-black tracking-widest text-white">TRENDING NOW</span>
                </div>
                <p id="hero_tags" class="text-[9px] md:text-xs font-bold tracking-[0.3em] text-netflix_red uppercase"></p>
                <h1 id="hero_title" class="text-4xl sm:text-6xl md:text-8xl font-black text-white leading-tight"></h1>
                <p id="hero_desc" class="text-gray-300 text-xs md:text-base leading-relaxed line-clamp-3 max-w-xl font-medium"></p>
                <div class="pt-2 md:pt-4">
                    <button class="bg-white text-black px-8 md:px-12 py-3 md:py-4 rounded-xl font-black flex items-center justify-center gap-3 hover:bg-netflix_red hover:text-white transition-all text-xs md:text-sm">
                        <i class="fa-solid fa-play"></i> WATCH NOW
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog_container" class="px-5 md:px-16 pb-20 relative z-40 space-y-8 md:space-y-12 mt-6 flex flex-col"></div>

    <footer class="bg-[#080808] py-10 px-5 text-center border-t border-white/5 space-y-3">
        <p class="text-[9px] md:text-[10px] uppercase font-bold tracking-[0.3em] text-gray-600 pt-2">Movie Cinema © 2026 | Powered by Kaveesha Theekshana</p>
    </footer>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        let AllMoviesMasterList = [];

        window.onload = () => {
            // Hero Section Setup
            document.getElementById('hero').style.backgroundImage = `url('${FEATURED_MOVIE.image}')`;
            document.getElementById('hero_title').innerText = FEATURED_MOVIE.title;
            document.getElementById('hero_tags').innerText = FEATURED_MOVIE.tags;
            document.getElementById('hero_desc').innerText = FEATURED_MOVIE.description;

            // Master List එකට සියලුම මූවීස් එකතු කිරීම (සර්ච් එක සඳහා)
            AllMoviesMasterList.push({ name: FEATURED_MOVIE.title, img: FEATURED_MOVIE.image, url: FEATURED_MOVIE.url });
            
            MOVIE_CATEGORIES.forEach(cat => cat.movies.forEach(mov => {
                if(!AllMoviesMasterList.find(m => m.name === mov.name)) AllMoviesMasterList.push(mov);
            }));

            // 🔴 සර්ච් එකට පමණක් අවශ්‍ය අලුත් මූවීස් මෙතනට එකතු වේ
            ADDITIONAL_SEARCH_MOVIES.forEach(mov => {
                if(!AllMoviesMasterList.find(m => m.name === mov.name)) AllMoviesMasterList.push(mov);
            });

            renderCategoriesUI();
            
            // නම පෙන්වීම
            const name = localStorage.getItem('kavi_user_name');
            if (name) {
                document.getElementById('user_display').classList.remove('hidden');
                document.getElementById('display_name').innerText = name;
            }
        };

        // සාමාන්‍ය කැටගරි පෙනුම
        function renderCategoriesUI() {
            const container = document.getElementById('catalog_container');
            container.innerHTML = '';
            container.classList.remove('search-grid-active', 'grid', 'grid-cols-2', 'md:grid-cols-5', 'gap-4');
            container.classList.add('flex', 'flex-col', 'space-y-8'); // මුල් පෙනුම ස්ථාවර කිරීම

            MOVIE_CATEGORIES.forEach(category => {
                let html = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center pr-2">
                            <h3 class="text-sm md:text-lg font-black tracking-widest text-white uppercase">${category.categoryTitle}</h3>
                            <a href="${category.allUrl}" class="text-[10px] font-bold text-gray-500 hover:text-white uppercase tracking-wider">See All <i class="fa-solid fa-chevron-right text-[8px]"></i></a>
                        </div>
                        <div class="flex gap-3 md:gap-4 overflow-x-auto pb-4 hide-scrollbar snap-x snap-mandatory">
                `;
                category.movies.forEach(movie => {
                    html += `
                        <div onclick="window.location.href='${movie.url}'" class="movie-card snap-start shrink-0 w-[110px] md:w-[180px] aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer bg-dark_bg">
                            <img src="${movie.img}" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent flex flex-col justify-end p-3 opacity-0 hover:opacity-100 transition-opacity">
                                <p class="text-[10px] font-bold text-white truncate text-center">${movie.name}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function performSearch(query) {
            query = query.toLowerCase().trim();
            const suggestionsBox = document.getElementById('search_suggestions'); 
            const clearBtn = document.getElementById('clear_search_btn');
            
            if (query !== '') {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                suggestionsBox.classList.add('hidden');
                renderCategoriesUI(); // සර්ච් එක හිස් කළ විට මුල් UI එක පෙන්වයි
                return;
            }

            const filteredMovies = AllMoviesMasterList.filter(m => m.name.toLowerCase().includes(query));
            
            // Suggestion Dropdown එක පෙන්වීම
            if (filteredMovies.length > 0) {
                suggestionsBox.classList.remove('hidden');
                suggestionsBox.innerHTML = filteredMovies.slice(0, 5).map(m => `
                    <li onclick="window.location.href='${m.url}'" class="px-4 py-3 text-gray-300 hover:text-white hover:bg-white/10 cursor-pointer text-xs flex items-center gap-3 border-b border-white/5">
                        <img src="${m.img}" class="w-8 h-10 object-cover rounded">
                        <span>${m.name}</span>
                    </li>
                `).join('');
            } else {
                suggestionsBox.classList.add('hidden');
            }

            renderSearchResultsGrid(filteredMovies);
        }

        // සර්ච් රිසල්ට් මොබයිල් එකට ගැලපෙන ග්‍රිඩ් එකක් ලෙස පෙන්වීම
        function renderSearchResultsGrid(movies) {
            const container = document.getElementById('catalog_container');
            container.innerHTML = '';
            
            // UI එක ග්‍රිඩ් එකක් බවට පත් කිරීම
            container.classList.remove('flex', 'flex-col', 'space-y-8');
            container.classList.add('search-grid-active', 'grid', 'grid-cols-2', 'sm:grid-cols-3', 'md:grid-cols-5', 'lg:grid-cols-6', 'gap-4', 'mt-10');

            if (movies.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 font-bold">චිත්‍රපට හමුවූයේ නැත!</div>`;
                return;
            }

            container.innerHTML = movies.map(movie => `
                <div onclick="window.location.href='${movie.url}'" class="movie-card w-full aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer bg-dark_bg animate-zoom-in">
                    <img src="${movie.img}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 flex flex-col justify-end items-center p-3 opacity-0 hover:opacity-100 transition-opacity">
                        <div class="w-8 h-8 bg-netflix_red rounded-full flex items-center justify-center mb-2"><i class="fa-solid fa-play text-white text-[10px]"></i></div>
                        <p class="text-[10px] font-bold text-white truncate w-full text-center">${movie.name}</p>
                    </div>
                </div>`).join('');
        }

        function clearSearch() { 
            document.getElementById('nav_search').value = ''; 
            performSearch(''); 
        }

        // Dropdown එක එළියට ක්ලික් කළ විට වැසීමට
        document.addEventListener('click', e => {
            if (!document.getElementById('nav_search').contains(e.target)) {
                document.getElementById('search_suggestions').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
