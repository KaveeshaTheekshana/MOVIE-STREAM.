<!DOCTYPE html>

            image: "https://i.pinimg.com/1200x/ef/5a/d1/ef5ad10087cf703802e45e8ed8ed6fd3.jpg", 
            url: "From (2022) TV Series.html"

        const MOVIE_CATEGORIES = [
            {
                categoryTitle: "❤ ආදරණීය",
                allUrl: "Categories Lovely.html", 
                movies: [
                    { name: "With Love", img: "https://i.pinimg.com/1200x/53/c1/b3/53c1b328675424f0a380118a919a0b89.jpg", url: "With Love (2026).html" },
                    { name: "Premalu (2024)", img: "https://i.pinimg.com/736x/4d/c0/e5/4dc0e57536ef442e159bf92e7bb01dbe.jpg", url: "Premalu (2024).html" },
                    { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },
                    { name: "Squid Game", img: "https://m.media-amazon.com/images/M/MV5BYWE3MDVkN2ItZTI5NC00ZGIzLThmY2UtNjYwMTBhOTUyYmI4XkEyXkFqcGdeQXVyMTMzNDExODE5._V1_.jpg", url: "squid-game.html" },
                    { name: "Lucifer", img: "https://m.media-amazon.com/images/M/MV5BNDJjMzc4NGYtZmFmNS00Y2ZiLThjMWQtZDA2MWExYTM5Y2Y4XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg", url: "lucifer.html" }
                ]
            },
            {
                categoryTitle: "🎬 ක්‍රියාදාම",
                allUrl: "action-all.html",
                movies: [
                    { name: "Jurassic World Rebirth (2025)", img: "https://i.pinimg.com/1200x/03/36/14/03361454d641353d98ab0fbc500fc81f.jpg", url: "Jurassic World Rebirth (2025).html" },
                    { name: "Akhanda 2", img: "https://cinesubz.net/wp-content/uploads/2026/01/jo9efbQSGDZNQ6xMocyD1prFjdF.jpg", url: "Akhanda 2.html" }
                ]
            },
            {
                categoryTitle: "📺 රූපවාහිනී කතා මාලා",
                allUrl: "action-all.html",
                movies: [
                    { name: "From", img: "https://cinesubz.net/wp-content/uploads/2026/04/ltlz5IHLpaXQStXGmMbehfnIskZ.jpg", url: "From (2022) TV Series.html" },
                    { name: "Akhanda 2", img: "https://cinesubz.net/wp-content/uploads/2026/01/jo9efbQSGDZNQ6xMocyD1prFjdF.jpg", url: "Akhanda 2.html" }
                ]
            },
            {
                categoryTitle: "👻 Horror (හොල්මන්)",
                allUrl: "action-all.html",
                movies: [
                    { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },
                    { name: "River of Blood (2024)", img: "https://www.acmodasi.in/amdb/images/movie/c/h/river-of-blood-2024-jJpEuJ.jpg", url: "River of Blood (2024).html" }
                ]
            }
        ];

        const ADDITIONAL_SEARCH_MOVIES = [
            { name: "With Love", img: "https://i.pinimg.com/1200x/53/c1/b3/53c1b328675424f0a380118a919a0b89.jpg", url: "With Love (2026).html" },
            { name: "Premalu (2024)", img: "https://i.pinimg.com/736x/4d/c0/e5/4dc0e57536ef442e159bf92e7bb01dbe.jpg", url: "Premalu (2024).html" },
            { name: "Jurassic World Rebirth (2025)", img: "https://i.pinimg.com/1200x/03/36/14/03361454d641353d98ab0fbc500fc81f.jpg", url: "Jurassic World Rebirth (2025).html" },
            { name: "River of Blood (2024)", img: "https://www.acmodasi.in/amdb/images/movie/c/h/river-of-blood-2024-jJpEuJ.jpg", url: "River of Blood (2024).html" },
            { name: "Do Not Enter (2026)", img: "https://cinesubz.net/wp-content/uploads/2026/04/stM9N7eJmHKLmFR59JG4tLdN7Wk.jpg", url: "Do Not Enter (2026).html" },
        ];

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'Noto Sans Sinhala', 'sans-serif'] },
                    colors: { netflix_red: '#E50914', dark_bg: '#050505' },
                    animation: { 'zoom-in': 'zoomIn 0.3s ease-out forwards' },
                    keyframes: { zoomIn: { '0%': { transform: 'scale(0.9)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } } }
                }
            }
        }
    </script>

    <style>
        html, body { background-color: #050505; color: white; overflow-x: hidden; width: 100vw; max-width: 100%; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .hero-bg { background-color: #050505; background-size: cover; background-position: top center; background-repeat: no-repeat; height: auto; min-height: 100vh; position: relative; }
        
        /* 🔴 FIXED OVERLAY: Double Gradient for Seamless Blending (Removes Line) */
        .hero-overlay { 
            background: linear-gradient(to right, #050505 0%, rgba(5,5,5,0.7) 50%, transparent 100%), 
                        linear-gradient(to top, #050505 0%, #050505 10%, rgba(5,5,5,0.5) 30%, transparent 60%); 
            height: 100%; width: 100%; padding-top: 120px; padding-bottom: 80px; 
        }
        
        @media (max-width: 768px) {
            .hero-bg { background-size: 100% auto; background-position: top center; height: auto; min-height: 100vh; }
            .hero-overlay { 
                background: linear-gradient(to top, #050505 0%, #050505 45%, rgba(5,5,5,0.8) 65%, transparent 100%); 
                padding-top: 60vw; 
                justify-content: flex-start;
                padding-bottom: 4rem;
            }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .movie-card { transition: transform 0.3s ease; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; border-color: var(--netflix-red); box-shadow: 0 10px 20px rgba(229,9,20,0.3); }
        
        .search-grid-active { display: grid !important; flex-direction: unset !important; space-y: 0 !important; }
        
        #hero_title {
            background: linear-gradient(to bottom, #ffffff 30%, #aaaaaa 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body class="font-sans antialiased animate__animated animate__fadeIn" oncontextmenu="return false;">

    <nav class="fixed top-0 w-full z-50 flex items-center justify-between px-4 md:px-16 py-4 md:py-6 bg-gradient-to-b from-black/95 via-black/80 to-transparent animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3 md:gap-6">
            <a href="index.html" class="text-xl md:text-3xl font-black uppercase tracking-tighter flex items-center cursor-pointer hover:scale-105 transition-transform">
                <span class="text-white">Movie</span><span class="text-netflix_red">Stream</span>
            </a>
        </div>
        
        <div class="flex items-center gap-4 md:gap-5">
            <div class="relative z-50 flex items-center">
                <i class="fa-solid fa-search absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                <input type="text" id="nav_search" autocomplete="off" oninput="performSearch(this.value)" placeholder="Search Movies..." class="bg-white/10 border border-white/20 text-white text-[10px] md:text-xs font-bold rounded-2xl py-2 md:py-2.5 pl-8 md:pl-10 pr-8 md:pr-10 outline-none focus:border-netflix_red focus:bg-black/90 w-28 sm:w-48 transition-all placeholder-gray-400 shadow-lg">
                <i id="clear_search_btn" class="fa-solid fa-circle-xmark absolute right-3 md:right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer hidden hover:text-netflix_red transition-colors text-xs md:text-sm" onclick="clearSearch()"></i>
                <ul id="search_suggestions" class="absolute top-[110%] left-0 w-[180px] sm:w-[250px] bg-[#111] border border-gray-700 rounded-xl shadow-2xl hidden max-h-60 overflow-y-auto z-[100] py-2"></ul>
            </div>
            <a href="whatsapp://send?phone=94710388481" class="w-8 h-8 flex-shrink-0 md:w-10 md:h-10 rounded-full bg-netflix_red flex items-center justify-center hover:scale-110 transition-transform cursor-pointer shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                <i class="fa-solid fa-headset text-white text-xs md:text-sm"></i>
            </a>
        </div>
    </nav>

    <div id="hero" class="hero-bg">
        <div class="hero-overlay flex flex-col md:justify-center px-5 md:px-16">
            <div class="max-w-3xl flex flex-col space-y-4 md:space-y-6 w-full animate__animated animate__fadeInUp animate__delay-1s mt-8 md:mt-0">
                
                <div class="flex flex-wrap items-center gap-2 md:gap-3 text-[9px] md:text-xs font-bold tracking-widest text-gray-300 uppercase mb-2">
                    <span class="bg-netflix_red text-white px-2 py-0.5 rounded shadow-lg flex items-center gap-1"><i class="fa-solid fa-fire text-[10px]"></i> TOP 10 TODAY</span>
                    <span class="border border-gray-600 px-2 py-0.5 rounded backdrop-blur-sm">4K ULTRA HD</span>
                    <span class="flex items-center gap-1 text-yellow-500"><i class="fa-solid fa-star"></i> 8.1 IMDb</span>
                    <span><i class="fa-regular fa-clock"></i> 155 MIN</span>
                </div>

                <h1 id="hero_title" class="text-5xl sm:text-7xl md:text-9xl font-black leading-[1.1] tracking-tighter uppercase mb-1"></h1>
                
                <p id="hero_tags" class="text-[10px] md:text-sm font-black tracking-[0.3em] text-netflix_red uppercase opacity-90"></p>
                <p id="hero_desc" class="text-gray-400 text-xs md:text-base leading-relaxed max-w-2xl font-medium"></p>
                
                <div class="pt-2 flex gap-3">
                    <button onclick="window.location.href=FEATURED_MOVIE.url" class="bg-white text-black px-8 md:px-12 py-3 md:py-4 rounded-xl font-black flex items-center justify-center gap-3 hover:bg-gray-300 transition-all text-xs md:text-sm shadow-xl cursor-pointer z-[100] relative">
                        <i class="fa-solid fa-play text-lg"></i> WATCH NOW
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog_container" class="px-5 md:px-16 pb-20 relative z-40 space-y-10 md:space-y-14 flex flex-col mt-4 md:mt-0"></div>

    <footer class="bg-[#080808] py-12 px-5 text-center border-t border-white/10 space-y-4">
        <h1 class="text-2xl md:text-3xl font-black uppercase tracking-tighter opacity-50">
            MOVIE<span class="text-netflix_red">STREAM</span>
        </h1>
        <p class="text-[9px] md:text-[10px] uppercase font-bold tracking-[0.3em] text-gray-600 pt-2">Movie Cinema © 2026 | Powered by Kaveesha Theekshana</p>
    </footer>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        let AllMoviesMasterList = [];

        window.onload = () => {
            document.getElementById('hero').style.backgroundImage = `url('${FEATURED_MOVIE.image}')`;
            document.getElementById('hero_title').innerText = FEATURED_MOVIE.title;
            document.getElementById('hero_tags').innerText = FEATURED_MOVIE.tags;
            document.getElementById('hero_desc').innerText = FEATURED_MOVIE.description;

            AllMoviesMasterList.push({ name: FEATURED_MOVIE.title, img: FEATURED_MOVIE.image, url: FEATURED_MOVIE.url });
            
            MOVIE_CATEGORIES.forEach(cat => cat.movies.forEach(mov => {
                if(!AllMoviesMasterList.find(m => m.name === mov.name)) AllMoviesMasterList.push(mov);
            }));

            ADDITIONAL_SEARCH_MOVIES.forEach(mov => {
                if(!AllMoviesMasterList.find(m => m.name === mov.name)) AllMoviesMasterList.push(mov);
            });

            renderCategoriesUI();
        };

        function renderCategoriesUI() {
            const container = document.getElementById('catalog_container');
            container.innerHTML = '';
            container.classList.remove('search-grid-active', 'grid', 'grid-cols-2', 'md:grid-cols-5', 'gap-4');
            container.classList.add('flex', 'flex-col', 'space-y-8'); 

            MOVIE_CATEGORIES.forEach((category, catIndex) => {
                let html = `
                    <div class="space-y-4 animate__animated animate__fadeInUp" style="animation-delay: ${catIndex * 0.15}s">
                        <div class="flex justify-between items-center pr-2 border-l-4 border-netflix_red pl-3">
                            <h3 class="text-sm md:text-xl font-black tracking-widest text-white uppercase">${category.categoryTitle}</h3>
                            <a href="${category.allUrl}" class="text-[10px] font-bold text-gray-500 hover:text-white uppercase tracking-wider flex items-center gap-1 transition-colors">See All <i class="fa-solid fa-chevron-right text-[8px]"></i></a>
                        </div>
                        <div class="flex gap-3 md:gap-4 overflow-x-auto pb-4 pt-2 hide-scrollbar snap-x snap-mandatory">
                `;
                category.movies.forEach((movie, idx) => {
                    html += `
                        <div onclick="window.location.href='${movie.url}'" style="animation-delay: ${idx * 0.05}s" class="movie-card animate__animated animate__fadeInRight snap-start shrink-0 w-[120px] md:w-[180px] aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer bg-dark_bg group">
                            <img src="${movie.img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent flex flex-col justify-end items-center p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <div class="w-8 h-8 bg-netflix_red rounded-full flex items-center justify-center mb-3 shadow-[0_0_15px_rgba(229,9,20,0.8)]"><i class="fa-solid fa-play text-white text-xs ml-0.5"></i></div>
                                <p class="text-xs font-bold text-white w-full text-center leading-tight line-clamp-2 drop-shadow-md">${movie.name}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function performSearch(query) {
            query = query.toLowerCase().trim();
            const suggestionsBox = document.getElementById('search_suggestions'); 
            const clearBtn = document.getElementById('clear_search_btn');
            
            if (query !== '') {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                suggestionsBox.classList.add('hidden');
                renderCategoriesUI(); 
                return;
            }

            const filteredMovies = AllMoviesMasterList.filter(m => m.name.toLowerCase().includes(query));
            
            if (filteredMovies.length > 0) {
                suggestionsBox.classList.remove('hidden');
                suggestionsBox.innerHTML = filteredMovies.slice(0, 6).map(m => `
                    <li onclick="window.location.href='${m.url}'" class="px-4 py-3 text-gray-300 hover:text-white hover:bg-netflix_red/20 cursor-pointer text-xs flex items-center gap-3 border-b border-white/5 transition-colors">
                        <img src="${m.img}" class="w-8 h-10 object-cover rounded shadow-md">
                        <span class="font-bold">${m.name}</span>
                    </li>
                `).join('');
            } else {
                suggestionsBox.classList.add('hidden');
            }

            renderSearchResultsGrid(filteredMovies);
        }

        function renderSearchResultsGrid(movies) {
            const container = document.getElementById('catalog_container');
            container.innerHTML = '';
            
            container.classList.remove('flex', 'flex-col', 'space-y-8');
            container.classList.add('search-grid-active', 'grid', 'grid-cols-2', 'sm:grid-cols-3', 'md:grid-cols-5', 'lg:grid-cols-6', 'gap-4', 'mt-10');

            if (movies.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 font-bold animate__animated animate__fadeIn text-sm uppercase tracking-widest"><i class="fa-solid fa-face-frown mb-3 text-2xl"></i><br>චිත්‍රපට හමුවූයේ නැත!</div>`;
                return;
            }

            container.innerHTML = movies.map((movie, idx) => `
                <div onclick="window.location.href='${movie.url}'" style="animation-delay: ${idx * 0.05}s" class="movie-card w-full aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer bg-dark_bg animate__animated animate__zoomIn group">
                    <img src="${movie.img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent flex flex-col justify-end items-center p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <div class="w-8 h-8 bg-netflix_red rounded-full flex items-center justify-center mb-3 shadow-[0_0_15px_rgba(229,9,20,0.8)]"><i class="fa-solid fa-play text-white text-xs ml-0.5"></i></div>
                        <p class="text-[11px] font-bold text-white w-full text-center leading-tight line-clamp-2 drop-shadow-md">${movie.name}</p>
                    </div>
                </div>`).join('');
        }

        function clearSearch() { 
            document.getElementById('nav_search').value = ''; 
            performSearch(''); 
        }

        document.addEventListener('click', e => {
            if (!document.getElementById('nav_search').contains(e.target)) {
                document.getElementById('search_suggestions').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
