    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        let AllMoviesMasterList = [];

        window.onload = () => {
            document.getElementById('hero').style.backgroundImage = `url('${FEATURED_MOVIE.image}')`;
            document.getElementById('hero_title').innerText = FEATURED_MOVIE.title;
            document.getElementById('hero_tags').innerText = FEATURED_MOVIE.tags;
            document.getElementById('hero_desc').innerText = FEATURED_MOVIE.description;

            AllMoviesMasterList.push({ name: FEATURED_MOVIE.title.replace(':', ''), img: FEATURED_MOVIE.image, url: FEATURED_MOVIE.url });
            MOVIE_CATEGORIES.forEach(cat => cat.movies.forEach(mov => {
                if(!AllMoviesMasterList.find(m => m.name === mov.name)) AllMoviesMasterList.push(mov);
            }));

            renderCategoriesUI();
            const name = localStorage.getItem('kavi_user_name');
            if (name) {
                document.getElementById('user_display').classList.remove('hidden');
                document.getElementById('display_name').innerText = name;
            }
        };

        function renderCategoriesUI() {
            const container = document.getElementById('catalog_container');
            container.innerHTML = '';
            MOVIE_CATEGORIES.forEach(category => {
                let html = `
                    <div class="space-y-2 md:space-y-4">
                        <div class="flex justify-between items-center pr-2 md:pr-10">
                            <h3 class="text-sm md:text-lg font-black tracking-widest text-white drop-shadow-md">${category.categoryTitle}</h3>
                            <a href="${category.allUrl}" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white border border-white/20 px-3 py-1 md:py-1.5 rounded-full uppercase tracking-wider flex items-center gap-1">See All <i class="fa-solid fa-chevron-right text-[8px]"></i></a>
                        </div>
                        <div class="flex gap-3 md:gap-4 overflow-x-auto pb-4 hide-scrollbar snap-x snap-mandatory">
                `;
                category.movies.forEach(movie => {
                    html += `
                        <div onclick="window.location.href='${movie.url}'" class="movie-card snap-start shrink-0 w-[110px] md:w-[160px] lg:w-[200px] aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer group bg-dark_bg">
                            <img src="${movie.img}" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute inset-0 bg-black/40 md:opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end items-center p-3">
                                <div class="play-icon absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-netflix_red rounded-full flex items-center justify-center"><i class="fa-solid fa-play text-white ml-1"></i></div>
                                <p class="text-[9px] md:text-xs font-bold text-center text-white drop-shadow-md truncate w-full">${movie.name}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function performSearch(query) {
            query = query.toLowerCase().trim();
            const suggestionsBox = document.getElementById('search_suggestions'); 
            const searchInput = document.getElementById('nav_search');
            const clearBtn = document.getElementById('clear_search_btn');
            if (query !== '') clearBtn.classList.remove('hidden'); else clearBtn.classList.add('hidden');
            if (query === '') { suggestionsBox.classList.add('hidden'); renderCategoriesUI(); return; }
            const filteredMovies = AllMoviesMasterList.filter(m => m.name.toLowerCase().includes(query));
            if (filteredMovies.length > 0) {
                suggestionsBox.classList.remove('hidden');
                suggestionsBox.innerHTML = filteredMovies.map(m => `<li onclick="window.location.href='${m.url}'" class="px-4 py-2.5 text-gray-400 hover:text-white hover:bg-gray-800 cursor-pointer text-[10px] md:text-xs truncate border-b border-white/5 last:border-0">${m.name}</li>`).join('');
            } else suggestionsBox.classList.add('hidden');
            renderSearchResultsGrid(filteredMovies);
        }

        function renderSearchResultsGrid(movies) {
            const container = document.getElementById('catalog_container');
            if (movies.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500 font-bold">චිත්‍රපට හමුවූයේ නැත!</div>`;
                return;
            }
            container.className = 'px-5 md:px-16 pb-20 grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-3 md:gap-6 relative z-40';
            container.innerHTML = movies.map(movie => `
                <div onclick="window.location.href='${movie.url}'" class="movie-card w-full aspect-[2/3] rounded-xl overflow-hidden border border-white/10 relative cursor-pointer group bg-dark_bg animate-zoom-in">
                    <img src="${movie.img}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/50 flex flex-col justify-end items-center p-3 opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="play-icon absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-netflix_red rounded-full flex items-center justify-center"><i class="fa-solid fa-play text-white ml-1"></i></div>
                        <p class="text-[9px] font-bold text-white truncate w-full text-center">${movie.name}</p>
                    </div>
                </div>`).join('');
        }

        function clearSearch() { document.getElementById('nav_search').value = ''; performSearch(''); }

        document.addEventListener('click', e => {
