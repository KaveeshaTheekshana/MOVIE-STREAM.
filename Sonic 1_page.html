<script>
        const BOT_URL = "https://api.moviestream.lat";
        const MOVIE_NAME = "Sonic_the_Hedgehog_2020_4K";
        const MOVIE_LINK = "https://dl.springsfern.in/dl/AAAAAdURLsdGScB1AAAGvQ/kFpKysNIbfZld2Yln69VbYykF09qmn5knq53MKmA3-w";

        let controller = null;
        let pollingInterval = null; 

        window.addEventListener('DOMContentLoaded', () => {
            const lastNum = localStorage.getItem('last_user_num');
            if (lastNum) {
                document.getElementById('waNumber').value = lastNum;
                // පේජ් එකට ආව ගමන් අංකයක් සේව් වෙලා තියෙනව නම් බොට්ගෙන් Status එක අහනවා
                checkCurrentStatus(lastNum);
            }
        });

        function clearDownloadState() {
            if (pollingInterval) clearInterval(pollingInterval);
            localStorage.removeItem('active_movie');
        }

        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function checkHistory() {
            const last = localStorage.getItem('last_user_num');
            if (last && document.getElementById('waNumber').value === "") {
                document.getElementById('savedNum').innerText = last;
                document.getElementById('historyModal').style.display = 'flex';
            }
        }

        function useOldNum() {
            document.getElementById('waNumber').value = localStorage.getItem('last_user_num');
            closeM('historyModal');
        }

        function clearOldNum() {
            document.getElementById('waNumber').value = ""; 
            localStorage.removeItem('last_user_num'); 
            clearDownloadState();
            setUI(false);
            closeM('historyModal'); 
            document.getElementById('waNumber').focus(); 
        }

        function triggerPreModal() {
            const num = document.getElementById('waNumber').value.trim();
            if (num.length < 10) { alert("කරුණාකර නිවැරදි WhatsApp අංකයක් ඇතුළත් කරන්න!"); return; }
            document.getElementById('instructionModal').style.display = 'flex';
        }

        async function triggerBot() {
            closeM('instructionModal');
            const number = document.getElementById('waNumber').value.replace(/[^0-9]/g, '');
            localStorage.setItem('last_user_num', number);
            localStorage.setItem('active_movie', MOVIE_NAME);
            
            setUI(true);
            controller = new AbortController();

            try {
                const response = await fetch(`${BOT_URL}/send-movie?number=${number}&movieUrl=${encodeURIComponent(MOVIE_LINK)}&movieName=${encodeURIComponent(MOVIE_NAME)}`, { signal: controller.signal });
                const data = await response.json();

                if (data.status === "Queued" || data.status === "Success") {
                    updateStatusDisplay(data.status, data.position);
                    startPolling(number);
                }
            } catch (err) {
                if (err.name !== 'AbortError') showError();
            }
        }

        // 🔴 අලුත්: Page එක Load වෙනකොටම අගය පරීක්ෂා කිරීම
        async function checkCurrentStatus(number) {
            const activeMovie = localStorage.getItem('active_movie');
            if (activeMovie !== MOVIE_NAME) return;

            try {
                const res = await fetch(`${BOT_URL}/check-status?number=${number}`);
                const data = await res.json();

                if (data.status === "Queued" || data.status === "Processing") {
                    setUI(true);
                    updateStatusDisplay(data.status, data.position);
                    startPolling(number); // නැවතුණු Polling එක ආයේ පටන් ගන්නවා
                } else if (data.status === "Success") {
                    clearDownloadState();
                    // සාර්ථකයි නම් මුකුත් නොපෙන්වා ඉන්නවා (මොකද ෆිල්ම් එක ගිහින් ඉවරයි)
                } else {
                    clearDownloadState();
                }
            } catch (e) {
                // සර්වර් එකට connect වෙන්න බැරි නම් මුකුත් කරන්නේ නෑ
            }
        }

        function startPolling(number) {
            if (pollingInterval) clearInterval(pollingInterval);
            
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${BOT_URL}/check-status?number=${number}`);
                    const data = await res.json();

                    if (data.status === "Success") {
                        clearInterval(pollingInterval);
                        clearDownloadState();
                        showSuccess();
                    } else if (data.status === "Error") {
                        clearInterval(pollingInterval);
                        clearDownloadState();
                        showError();
                    } else {
                        updateStatusDisplay(data.status, data.position);
                    }
                } catch (e) {}
            }, 10000); 
        }

        // 🔴 අලුත්: Status පෙන්වන කොටස වෙනම ෆන්ක්ෂන් එකකට ගත්තා ලේසි වෙන්න
        function updateStatusDisplay(status, position) {
            const statusDiv = document.getElementById('status');
            
            if (status === "Queued") {
                statusDiv.innerHTML = `
                    <div style='color:#f1c40f; text-align:center;'>
                        <i class="fa-solid fa-clock"></i> <b>ඉල්ලීම පෝලිමේ! (ස්ථානය: #${position || 0})</b><br>
                        <span style="color:#25D366; font-size:14px; margin-top:10px; display:inline-block;">
                            කරුණාකර රැඳී සිටින්න...
                        </span>
                    </div>`;
            } else if (status === "Processing") {
                statusDiv.innerHTML = `
                    <div style='color:#f1c40f; text-align:center;'>
                        <span style="color:#25D366; font-size:15px; font-weight:bold;">
                            <div class='spinner' style="display:inline-block; vertical-align:middle; width:15px; height:15px; margin-right:5px;"></div>
                            දැන් ඔබගේ අංකයට යවමින් පවතී!
                        </span>
                    </div>`;
            }
        }

        function showSuccess() {
            setUI(false); 
            document.getElementById('resultIcon').innerHTML = '<i class="fa-brands fa-whatsapp" style="color:var(--accent)"></i>';
            document.getElementById('resultTitle').innerText = "සාර්ථකයි!";
            document.getElementById('resultMessage').innerText = "චිත්‍රපටය සාර්ථකව ඔබගේ WhatsApp ගිණුමට යවන ලදි! කරුණාකර ඔබගේ WhatsApp පරීක්ෂා කරන්න. 🍿";
            document.getElementById('resultModal').style.display = 'flex';
        }

        function showError() {
            setUI(false); 
            document.getElementById('resultIcon').innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ff4d4d"></i>';
            document.getElementById('resultTitle').innerText = "දෝෂයකි!";
            document.getElementById('resultMessage').innerText = "සර්වර් එක සමඟ සම්බන්ධ වීමේ දෝෂයකි. බොට් offline වීමට හෝ ලින්ක් එකේ ගැටළුවක් විය හැක. කරුණාකර පසුව උත්සාහ කරන්න.";
            document.getElementById('resultModal').style.display = 'flex';
        }

        function setUI(isSending) {
            const status = document.getElementById('status');
            const cancelBtn = document.getElementById('cancelBtn');
            const sendBtn = document.getElementById('sendBtn');

            if (isSending) {
                status.style.display = 'block';
                cancelBtn.style.display = 'flex';
                sendBtn.style.display = 'none'; 
            } else {
                status.style.display = 'none';
                cancelBtn.style.display = 'none';
                sendBtn.style.display = 'flex'; 
            }
        }

        function triggerCancelWarning() {
            document.getElementById('cancelModal').style.display = 'flex';
        }

        async function triggerCancel() {
            closeM('cancelModal');
            const number = document.getElementById('waNumber').value.replace(/[^0-9]/g, '');
            if (controller) controller.abort();
            clearDownloadState();
            
            document.getElementById('status').innerHTML = "අවලංගු කරමින් පවතී...";
            
            try {
                await fetch(`${BOT_URL}/cancel?number=${number}`);
            } catch(e) {}

            location.reload(); 
        }
    </script>
